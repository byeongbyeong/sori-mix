name: Build macOS Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package macOS preview
        run: BUILD_CONFIG=Release ./scripts/package-mac.sh

      - name: Build macOS installer package
        run: ./scripts/build-mac-pkg.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Sori1-macOS-preview
          path: |
            dist/Sori1-macOS-preview.zip
            dist/Sori1-macOS-preview.pkg
