name: Release macOS Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package macOS preview
        run: BUILD_CONFIG=Release ./scripts/package-mac.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sori1-macOS-preview
          path: dist/Sori1-macOS-preview.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/Sori1-macOS-preview.zip" \
            --title "Sori 1 ${GITHUB_REF_NAME}" \
            --notes-file "dist/Sori1-macOS-preview/README.txt"
